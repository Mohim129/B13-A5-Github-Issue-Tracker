<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <link rel="stylesheet" href="./style/style.css">
    <!-- tailwind and daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="grid justify-center items-center mx-auto space-y-6 max-w-sm w-11/12 p-4 sm:p-8 mt-16 text-center  rounded-md bg-base-100 shadow-2xl">

      <img class="mx-auto" src="./assets/github-logo.png" alt="">
      <div class="text-center">
        
        <h2 class="font-semibold text-xl">GitHub Issues Tracker</h2>
        <p class="text-[#64748B] text-xs">Sign in to manage your issues</p>
      </div>
      <div>
        <form id="login-form"
          class="fieldset bg-base-200 w-xs p-4"
        >
          <!-- <legend class="fieldset-legend">Login</legend> -->

          <label class="label text-black">Username</label>
          <input id="username" type="text" class="input" placeholder="Enter Username" />

          <label class="label text-black">Password</label>
          <input id="password" type="password" class="input" placeholder="Enter Password" />

          <button type="submit" class="btn btn-primary mt-4">Sign In</button>
        </form>
      </div>
      
        <p class="text-[#64748B] text-xs">OR</p>
      
      <div class="space-y-8">
        <p class="text-[#64748B] text-xs">Demo Credentials:</p>
        <div>
            <p class="text-[14px]"><span class="font-semibold">Username:</span> admin</p>
            <p class="text-[14px]"><span class="font-semibold">Password:</span> admin123</p>
        </div>
      </div>
    </section>


    <script src="./script/login.js"></script>
  </body>
</html>
